name: Save Progress

on:
  repository_dispatch:
    types: [save_progress]

jobs:
  save:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Save progress
        run: |
          echo '${{ toJson(github.event.client_payload.progress) }}' > progress.json
      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add progress.json
          git diff --staged --quiet || git commit -m "Update progress"
          git push
