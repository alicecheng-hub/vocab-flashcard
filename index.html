<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="單字卡">
<title>單字閃卡</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap');

:root {
  --bg: #f5f3ef;
  --surface: #ffffff;
  --surface2: #f0ede8;
  --border: rgba(0,0,0,0.08);
  --text: #1a1a1a;
  --muted: rgba(26,26,26,0.45);
  --hint: rgba(26,26,26,0.3);
  --green: #2a9d6e;
  --green-bg: rgba(42,157,110,0.1);
  --red: #c0533a;
  --red-bg: rgba(192,83,58,0.1);
  --gold: #b8832a;
  --radius: 18px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  user-select: none;
  overflow-x: hidden;
}

/* grain overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.6;
}

.app { position: relative; z-index: 1; flex: 1; display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; width: 100%; padding: 0 20px; }

/* Header */
header {
  padding: 52px 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.title {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  letter-spacing: -0.3px;
  color: var(--text);
}
.title span { color: var(--gold); font-style: italic; }

.header-right { display: flex; align-items: center; gap: 12px; }

.lang-tabs {
  display: flex;
  background: var(--surface);
  border-radius: 100px;
  padding: 3px;
  border: 0.5px solid var(--border);
}
.lang-tab {
  padding: 5px 14px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 400;
  color: var(--muted);
  cursor: pointer;
  transition: all .2s;
  border: none;
  background: none;
}
.lang-tab.active {
  background: var(--surface2);
  color: var(--text);
  font-weight: 500;
}

.settings-btn {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--surface);
  border: 0.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--muted);
  font-size: 15px;
}

/* Stats row */
.stats {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
}
.stat {
  flex: 1;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  padding: 10px 12px;
  text-align: center;
}
.stat-n {
  font-size: 20px;
  font-weight: 500;
  font-family: 'DM Serif Display', serif;
}
.stat-l {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
  letter-spacing: 0.3px;
}
.stat-n.green { color: var(--green); }
.stat-n.red { color: var(--red); }
.stat-n.gold { color: var(--gold); }

/* Progress bar */
.progress-wrap { margin-bottom: 28px; }
.progress-bar {
  height: 2px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--green));
  border-radius: 2px;
  transition: width .4s ease;
}
.progress-label {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  font-size: 11px;
  color: var(--hint);
}

/* Card */
.card-scene { flex: 1; perspective: 1000px; margin-bottom: 20px; min-height: 260px; }
.card-wrap {
  width: 100%;
  height: 100%;
  min-height: 260px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform .5s cubic-bezier(.4,0,.2,1);
  cursor: pointer;
}
.card-wrap.flipped { transform: rotateY(180deg); }

.card-face {
  position: absolute;
  inset: 0;
  border-radius: var(--radius);
  border: 0.5px solid var(--border);
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  gap: 10px;
}
.card-front { background: var(--surface); }
.card-back {
  background: var(--surface2);
  transform: rotateY(180deg);
}

.card-lang-badge {
  position: absolute;
  top: 16px; left: 20px;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--hint);
  font-weight: 500;
}
.card-num {
  position: absolute;
  top: 16px; right: 20px;
  font-size: 11px;
  color: var(--hint);
}
.card-tap-hint {
  position: absolute;
  bottom: 16px;
  font-size: 11px;
  color: var(--hint);
  display: flex;
  align-items: center;
  gap: 4px;
}
.card-sound-btn {
  position: absolute;
  bottom: 12px; right: 16px;
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--surface2);
  border: 0.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 14px;
  transition: background .15s;
}
.card-sound-btn:active { background: var(--surface); }

.word-en {
  font-family: 'DM Serif Display', serif;
  font-size: 36px;
  letter-spacing: -0.5px;
  color: var(--text);
  text-align: center;
  line-height: 1.1;
}
.word-jp {
  font-size: 34px;
  font-weight: 300;
  color: var(--text);
  text-align: center;
}
.word-reading {
  font-size: 15px;
  color: var(--muted);
  text-align: center;
}
.word-sub {
  font-size: 13px;
  color: var(--hint);
  text-align: center;
}

.back-meanings {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
}
.meaning-row {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding: 10px 14px;
  background: var(--bg);
  border-radius: 10px;
  border: 0.5px solid var(--border);
}
.meaning-label {
  font-size: 10px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--hint);
  min-width: 20px;
  font-weight: 500;
}
.meaning-text {
  font-size: 16px;
  color: var(--text);
  font-weight: 400;
}
.meaning-text.serif { font-family: 'DM Serif Display', serif; font-size: 18px; }
.back-example-wrap {
  width: 100%;
  background: rgba(212,168,83,0.08);
  border: 0.5px solid rgba(212,168,83,0.35);
  border-radius: 10px;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.back-example-label {
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 500;
}
.back-example {
  font-size: 16px;
  color: var(--gold);
  text-align: left;
  line-height: 1.7;
  font-style: italic;
}
.back-example-zh {
  font-size: 14px;
  color: var(--text);
  text-align: left;
  line-height: 1.6;
  opacity: 0.75;
  white-space: pre-line;
}

.back-conj-wrap {
  width: 100%;
  background: rgba(42,157,110,0.07);
  border: 0.5px solid rgba(42,157,110,0.25);
  border-radius: 10px;
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.back-conj {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.conj-item {
  font-size: 14px;
  color: var(--text);
  display: flex;
  align-items: baseline;
  gap: 8px;
}
.conj-label {
  font-size: 10px;
  letter-spacing: 0.8px;
  color: var(--green);
  font-weight: 500;
  min-width: 38px;
}
.action-row {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .3s;
  transform: translateY(8px);
}
.action-row.visible {
  opacity: 1;
  pointer-events: all;
  transform: translateY(0);
  transition: opacity .3s, transform .3s;
}

.btn {
  flex: 1;
  padding: 14px 0;
  border-radius: 14px;
  font-size: 14px;
  font-weight: 500;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  border: 0.5px solid;
  transition: all .15s;
  letter-spacing: 0.2px;
}
.btn:active { transform: scale(0.97); }
.btn-again {
  background: var(--red-bg);
  border-color: var(--red);
  color: var(--red);
}
.btn-know {
  background: var(--green-bg);
  border-color: var(--green);
  color: var(--green);
}

/* Done screen */
.done-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  text-align: center;
  gap: 16px;
  padding: 40px 0;
}
.done-screen.show { display: flex; }
.done-icon { font-size: 48px; margin-bottom: 8px; }
.done-title {
  font-family: 'DM Serif Display', serif;
  font-size: 28px;
  letter-spacing: -0.5px;
}
.done-sub { font-size: 14px; color: var(--muted); line-height: 1.6; }
.done-btns { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: 12px; }
.btn-outline {
  padding: 14px;
  border-radius: 14px;
  font-size: 14px;
  font-weight: 500;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  border: 0.5px solid var(--border);
  background: var(--surface);
  color: var(--text);
  transition: all .15s;
  text-align: center;
}
.btn-outline:active { transform: scale(0.98); background: var(--surface2); }
.btn-gold {
  background: rgba(212,168,83,0.12);
  border-color: var(--gold);
  color: var(--gold);
}

/* Main area toggle */
.main-area { display: flex; flex-direction: column; flex: 1; }
.main-area.hidden { display: none; }

/* Toast */
.toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface2);
  border: 0.5px solid var(--border);
  padding: 10px 20px;
  border-radius: 100px;
  font-size: 13px;
  color: var(--text);
  opacity: 0;
  transition: all .3s;
  z-index: 999;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="title">單字<span>閃卡</span></div>
    <div class="header-right">
      <div class="lang-tabs">
        <button class="lang-tab active" onclick="setLang('en')">英文</button>
        <button class="lang-tab" onclick="setLang('jp')">日文</button>
      </div>
    </div>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="stat-n gold" id="stat-total">—</div>
      <div class="stat-l">總單字</div>
    </div>
    <div class="stat">
      <div class="stat-n green" id="stat-known">—</div>
      <div class="stat-l">已掌握</div>
    </div>
    <div class="stat">
      <div class="stat-n red" id="stat-left">—</div>
      <div class="stat-l">待學習</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div class="progress-label">
      <span id="prog-batch">載入中...</span>
      <span id="prog-count"></span>
    </div>
  </div>

  <div class="main-area" id="main-area">
    <div class="card-scene">
      <div class="card-wrap" id="card" onclick="flipCard()">
        <div class="card-face card-front" id="front">
          <div class="card-lang-badge" id="lang-badge">EN</div>
          <div class="card-num" id="card-num">1</div>
          <div class="word-en" id="front-word">—</div>
          <div class="word-reading" id="front-reading" style="display:none"></div>
          <div class="card-tap-hint">點擊翻面</div>
          <div class="card-sound-btn" id="sound-front" onclick="event.stopPropagation();speak('front')">🔊</div>
        </div>
        <div class="card-face card-back" id="back">
          <div class="card-lang-badge" id="lang-badge-back">EN</div>
          <div class="back-meanings" id="back-meanings"></div>
          <div class="back-example-wrap" id="back-example-wrap">
            <div class="back-example-label">例句</div>
            <div class="back-example" id="back-example"></div>
            <div class="back-example-zh" id="back-example-zh"></div>
          </div>
          <div class="back-conj-wrap" id="back-conj-wrap">
            <div class="back-example-label">動詞變化</div>
            <div class="back-conj" id="back-conj"></div>
          </div>
          <div class="card-sound-btn" id="sound-back" onclick="event.stopPropagation();speak('back')">🔊</div>
        </div>
      </div>
    </div>

    <div class="action-row" id="action-row">
      <button class="btn btn-again" onclick="rate(false)">再複習</button>
      <button class="btn btn-know" onclick="rate(true)">認識了 ✓</button>
    </div>
  </div>

  <div class="done-screen" id="done-screen">
    <div class="done-icon">✦</div>
    <div class="done-title" id="done-title">批次完成！</div>
    <div class="done-sub" id="done-sub"></div>
    <div class="done-btns">
      <button class="btn-outline btn-gold" id="next-batch-btn" onclick="nextBatch()">下一批單字 →</button>
      <button class="btn-outline" onclick="reviewAgain()">再練習一次不熟的</button>
      <button class="btn-outline" onclick="resetAll()">重置所有進度</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Config ──────────────────────────────────────────────
const REPO  = 'alicecheng-hub/vocab-flashcard';
const BATCH = 20;
const STORAGE_KEY = 'vocab_progress_v3'; // localStorage fallback key

// ── State ────────────────────────────────────────────────
let WORDS   = { en: [], jp: [] };
let lang    = 'en';
let known   = { en: [], jp: [] };
let deck    = [];
let batchIdx = 0;
let cardIdx  = 0;
let sessionKnown = 0;
let sessionAgain = 0;
let againWords   = [];
let flipped = false;
let voices  = [];
let saveTimeout = null;

// ── Load data ────────────────────────────────────────────
async function init() {
  try {
    const [enRes, jpRes, progRes] = await Promise.all([
      fetch('words_en.json?v=' + Date.now()),
      fetch('words_jp.json?v=' + Date.now()),
      fetch('progress.json?v=' + Date.now())
    ]);
    WORDS.en = await enRes.json();
    WORDS.jp = await jpRes.json();
    const prog = await progRes.json();
    // Merge with localStorage in case GitHub is behind
    const local = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{"en":[],"jp":[]}');
    known.en = mergeArrays(prog.en || [], local.en || []);
    known.jp = mergeArrays(prog.jp || [], local.jp || []);
  } catch(e) {
    console.warn('Load error, using localStorage fallback', e);
    known = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{"en":[],"jp":[]}');
  }
  loadBatch();
}

function mergeArrays(a, b) {
  return [...new Set([...a, ...b])];
}

// ── Save progress ────────────────────────────────────────
function saveProgress() {
  // Always save to localStorage immediately
  localStorage.setItem(STORAGE_KEY, JSON.stringify(known));
  // Debounce GitHub save (wait 3s after last change)
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(saveToGitHub, 3000);
}

async function saveToGitHub() {
  try {
    await fetch(`https://api.github.com/repos/${REPO}/dispatches`, {
      method: 'POST',
      headers: {
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        event_type: 'save_progress',
        client_payload: { progress: known }
      })
    });
  } catch(e) {
    console.warn('GitHub save failed, localStorage still has data', e);
  }
}

// ── Speech ───────────────────────────────────────────────
window.speechSynthesis.onvoiceschanged = () => { voices = window.speechSynthesis.getVoices(); };
setTimeout(() => { voices = window.speechSynthesis.getVoices(); }, 500);

function getVoice(key) {
  const map = { en: ['en-US','en-GB','en'], jp: ['ja-JP','ja'] };
  for (const p of (map[key] || ['en'])) {
    const v = voices.find(v => v.lang.startsWith(p));
    if (v) return v;
  }
  return null;
}

function speakUtterance(text, langCode) {
  const u = new SpeechSynthesisUtterance(text);
  const v = getVoice(langCode.startsWith('en') ? 'en' : 'jp');
  if (v) u.voice = v;
  u.lang = langCode;
  u.rate = 0.9;
  return u;
}

function speak(side) {
  if (!window.speechSynthesis) return;
  const w = deck[cardIdx];
  if (!w) return;
  window.speechSynthesis.cancel();
  if (lang === 'en') {
    window.speechSynthesis.speak(speakUtterance(w.en, 'en-US'));
  } else {
    if (side === 'front') {
      window.speechSynthesis.speak(speakUtterance(w.jp, 'ja-JP'));
    } else {
      const uEn = speakUtterance(w.en, 'en-US');
      const uJp = speakUtterance(w.jp, 'ja-JP');
      uEn.onend = () => setTimeout(() => window.speechSynthesis.speak(uJp), 300);
      window.speechSynthesis.speak(uEn);
    }
  }
}

// ── Language switch ──────────────────────────────────────
function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-tab').forEach((t,i) => t.classList.toggle('active', i===(l==='en'?0:1)));
  batchIdx = 0; againWords = [];
  loadBatch();
}

// ── Deck logic ───────────────────────────────────────────
function shuffle(a) { return [...a].sort(() => Math.random() - .5); }

function getUnknown() {
  return WORDS[lang].filter((_, i) => !known[lang].includes(i));
}

function loadBatch() {
  const unknown = getUnknown();
  if (unknown.length === 0 && againWords.length === 0) { showAllDone(); return; }
  const newWords = shuffle(unknown).slice(0, Math.max(BATCH - againWords.length, 5));
  deck = shuffle([...againWords, ...newWords]).slice(0, BATCH + againWords.length);
  againWords = [];
  cardIdx = 0; sessionKnown = 0; sessionAgain = 0; flipped = false;
  document.getElementById('done-screen').classList.remove('show');
  document.getElementById('main-area').classList.remove('hidden');
  updateStats();
  renderCard();
}

function updateStats() {
  document.getElementById('stat-total').textContent = WORDS[lang].length;
  document.getElementById('stat-known').textContent = known[lang].length;
  document.getElementById('stat-left').textContent = WORDS[lang].length - known[lang].length;
}

// ── Card render ──────────────────────────────────────────
function renderCard() {
  if (cardIdx >= deck.length) { showBatchDone(); return; }
  const w = deck[cardIdx];
  const pct = Math.round(cardIdx / deck.length * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-batch').textContent = '批次 ' + (batchIdx + 1);
  document.getElementById('prog-count').textContent = (cardIdx + 1) + ' / ' + deck.length;

  const isJp = lang === 'jp';
  document.getElementById('lang-badge').textContent = isJp ? 'JP' : 'EN';
  document.getElementById('lang-badge-back').textContent = isJp ? 'JP' : 'EN';
  document.getElementById('card-num').textContent = cardIdx + 1;

  const fw = document.getElementById('front-word');
  const fr = document.getElementById('front-reading');
  fw.className = isJp ? 'word-jp' : 'word-en';
  fw.textContent = isJp ? w.jp : w.en;
  if (isJp && w.r) { fr.style.display = 'block'; fr.textContent = w.r; }
  else { fr.style.display = 'none'; }

  const meanings = document.getElementById('back-meanings');
  meanings.innerHTML = isJp
    ? `<div class="meaning-row"><span class="meaning-label">中</span><span class="meaning-text serif">${w.zh}</span></div>
       <div class="meaning-row"><span class="meaning-label">EN</span><span class="meaning-text">${w.en}</span></div>`
    : `<div class="meaning-row"><span class="meaning-label">中</span><span class="meaning-text serif">${w.zh}</span></div>
       <div class="meaning-row"><span class="meaning-label">JP</span><span class="meaning-text">${w.jp}${w.r?' ('+w.r+')':''}</span></div>`;

  const exWrap = document.getElementById('back-example-wrap');
  if (w.ex) {
    exWrap.style.display = 'flex';
    document.getElementById('back-example').textContent = '"' + w.ex + '"';
    let exSub = w.exzh || '';
    if (isJp && w.exr) exSub = w.exr + (exSub ? '\n' + exSub : '');
    document.getElementById('back-example-zh').textContent = exSub;
  } else { exWrap.style.display = 'none'; }

  const conjWrap = document.getElementById('back-conj-wrap');
  if (isJp && w.conj) {
    conjWrap.style.display = 'flex';
    document.getElementById('back-conj').innerHTML =
      `<span class="conj-item"><span class="conj-label">ます形</span>${w.conj.masu}</span>` +
      `<span class="conj-item"><span class="conj-label">ない形</span>${w.conj.nai}</span>` +
      `<span class="conj-item"><span class="conj-label">て形</span>${w.conj.te}</span>`;
  } else { conjWrap.style.display = 'none'; }

  document.getElementById('card').classList.remove('flipped');
  flipped = false;
  document.getElementById('action-row').classList.remove('visible');
  setTimeout(() => speak('front'), 300);
}

function flipCard() {
  if (flipped) return;
  flipped = true;
  document.getElementById('card').classList.add('flipped');
  setTimeout(() => {
    document.getElementById('action-row').classList.add('visible');
    speak('back');
  }, 500);
}

function rate(isKnown) {
  if (isKnown) {
    sessionKnown++;
    const origIdx = WORDS[lang].indexOf(deck[cardIdx]);
    if (origIdx !== -1 && !known[lang].includes(origIdx)) {
      known[lang].push(origIdx);
      saveProgress();
    }
  } else {
    sessionAgain++;
    againWords.push(deck[cardIdx]);
  }
  cardIdx++;
  updateStats();
  renderCard();
}

function showBatchDone() {
  document.getElementById('prog-fill').style.width = '100%';
  document.getElementById('main-area').classList.add('hidden');
  document.getElementById('done-screen').classList.add('show');
  document.getElementById('done-title').textContent = '批次完成！';
  const againNote = againWords.length > 0 ? `\n${againWords.length} 個不熟的字會混入下一批。` : '';
  document.getElementById('done-sub').textContent =
    `這批 ${deck.length} 個字：認識 ${sessionKnown} 個，需複習 ${sessionAgain} 個。總掌握：${known[lang].length} / ${WORDS[lang].length}${againNote}`;
  document.getElementById('next-batch-btn').style.display =
    (getUnknown().length > 0 || againWords.length > 0) ? 'block' : 'none';
}

function showAllDone() {
  document.getElementById('main-area').classList.add('hidden');
  document.getElementById('done-screen').classList.add('show');
  document.getElementById('done-title').textContent = '全部完成！';
  document.getElementById('done-sub').textContent = `恭喜！${WORDS[lang].length} 個單字全部掌握了！`;
  document.getElementById('next-batch-btn').style.display = 'none';
}

function nextBatch() { batchIdx++; loadBatch(); }

function reviewAgain() {
  if (againWords.length === 0) { toast('沒有需要複習的！'); return; }
  deck = shuffle([...againWords]);
  againWords = []; cardIdx = 0; sessionKnown = 0; sessionAgain = 0; flipped = false;
  document.getElementById('done-screen').classList.remove('show');
  document.getElementById('main-area').classList.remove('hidden');
  renderCard();
}

async function resetAll() {
  if (!confirm('確定要重置所有進度嗎？')) return;
  known = { en: [], jp: [] };
  localStorage.removeItem(STORAGE_KEY);
  saveToGitHub();
  batchIdx = 0; againWords = [];
  toast('進度已重置');
  loadBatch();
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Start ────────────────────────────────────────────────
init();
</script>
</body>
</html>
